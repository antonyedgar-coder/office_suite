<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — CA Office Suite</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: radial-gradient(1200px 600px at 20% 10%, #dbeafe, transparent 60%),
          radial-gradient(1200px 600px at 80% 40%, #fef3c7, transparent 55%),
          #f6f7fb;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .card {
        border: 1px solid #e8eaf1;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .brand {
        font-weight: 800;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div class="card p-4" style="max-width: 420px; width: 100%">
      <div class="mb-3">
        <div class="h4 brand mb-1">CA Office Suite</div>
        <div class="text-secondary small">Sign in with email and password.</div>
      </div>

      {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" class="vstack gap-2">
        {% csrf_token %}
        <div>
          <label class="form-label small text-secondary">Email</label>
          <input class="form-control" name="email" type="email" required />
        </div>
        <div>
          <label class="form-label small text-secondary">Password</label>
          <input class="form-control" name="password" type="password" required />
        </div>
        <button class="btn btn-primary mt-2" type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
