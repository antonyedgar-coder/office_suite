{% extends "base.html" %}
{% block title %}Delete portal password — CA Office Suite{% endblock %}
{% block page_title %}Delete portal password{% endblock %}

{% block content %}
  <div class="card p-3">
    <p>Delete portal password for <strong>{{ obj.client.client_name }}</strong> — {{ obj.portal.name }}?</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'portal_password_list' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
