{% extends "base.html" %}
{% block title %}Delete tender — CA Office Suite{% endblock %}
{% block page_title %}Delete tender entry{% endblock %}

{% block content %}
  <div class="card p-3">
    <p>Delete tender entry for <strong>{{ obj.client.client_name }}</strong> on <strong>{{ obj.date }}</strong>?</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'mis_tender_list' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
