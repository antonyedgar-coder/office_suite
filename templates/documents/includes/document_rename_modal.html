<div class="modal fade" id="docRenameModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="post" action="" id="docRenameForm">
        {% csrf_token %}
        <input type="hidden" name="next" id="docRenameNext" value="" />
        <div class="modal-header">
          <h5 class="modal-title">Edit file name</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="text-secondary small">Change the name only. FY and period stay the same.</p>
          <label class="form-label required-field" for="docRenameName">File name</label>
          <input type="text" name="display_name" class="form-control" id="docRenameName" maxlength="120" required />
          <p class="form-field-hint mb-0 mt-2" id="docRenameCurrent"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  (function () {
    document.addEventListener("click", function (e) {
      var btn = e.target.closest(".js-doc-rename-open");
      if (!btn) return;
      e.preventDefault();
      var form = document.getElementById("docRenameForm");
      if (form) form.action = btn.getAttribute("data-rename-url") || "";
      var nextInput = document.getElementById("docRenameNext");
      if (nextInput) nextInput.value = btn.getAttribute("data-next") || "";
      var nameInput = document.getElementById("docRenameName");
      var current = btn.getAttribute("data-filename") || "";
      if (nameInput) {
        var base = current.replace(/\.[^.]+$/, "").replace(/_FY[^_]+(?:_.*)?$/, "");
        nameInput.value = base;
      }
      var curEl = document.getElementById("docRenameCurrent");
      if (curEl) curEl.textContent = current ? "Current: " + current : "";
      var modal = document.getElementById("docRenameModal");
      if (modal && window.bootstrap) bootstrap.Modal.getOrCreateInstance(modal).show();
    });
  })();
</script>
