{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Add master{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="{% static 'css/app.css' %}" rel="stylesheet" />
    <style>
      body.embed-popup-body {
        background: var(--bs-body-bg);
        min-height: 100vh;
      }
      .embed-popup-actions {
        position: sticky;
        bottom: 0;
        background: var(--bs-body-bg);
        z-index: 10;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="embed-popup-body p-3 p-md-4">
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
    <script>
      (function () {
        document.querySelectorAll("[data-embed-picker-cancel]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            window.parent.postMessage({ source: "caOfficePicker", event: "close" }, "*");
          });
        });
      })();
    </script>
  </body>
</html>
