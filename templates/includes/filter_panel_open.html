{# intro, form_id, form_method (default get), form_action (optional) #}
<div class="card filter-panel mb-3">
  {% if intro %}
    <p class="filter-panel-intro text-secondary small">{{ intro }}</p>
  {% endif %}
  <form
    method="{{ form_method|default:'get' }}"
    class="filter-panel-form row g-3 align-items-end"
    {% if form_id %}id="{{ form_id }}"{% endif %}
    {% if form_action %}action="{{ form_action }}"{% endif %}
  >
